server:
  port: 8081

spring:
  application:
    name: rapidmq-spring
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:app}
    password: ${RABBITMQ_PASS:app}
    virtual-host: ${RABBITMQ_VHOST:/rapidmq}

app:
  rabbitmq:
    exchange: rapidmq.exchange
    routingKey: rapidmq.key
    queue: rapidmq.queue

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/logs

logging:
  level:
    de.ityreh.rapidmq: INFO
    org.springframework.boot.actuator.autoconfigure.opentelemetry: DEBUG
