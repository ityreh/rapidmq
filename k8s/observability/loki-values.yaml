deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  useTestSchema: true
  storage:
    type: filesystem
  limits_config:
    allow_structured_metadata: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 2Gi

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

minio:
  enabled: false
